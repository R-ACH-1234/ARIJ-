<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Background -->
  <rect width="500" height="500" fill="#ffffff" />
  
  <g transform="translate(120, 150)">
    <!-- Antenna -->
    <line x1="230" y1="-50" x2="230" y2="20" stroke="#063b5f" stroke-width="12" stroke-linecap="round" />
    <circle cx="230" cy="-50" r="12" fill="#063b5f" />

    <!-- Main blue body (like a chat bubble) -->
    <path d="M20,20 L240,20 C251,20 260,29 260,40 L260,140 C260,151 251,160 240,160 L60,160 L40,195 L40,160 C29,160 20,151 20,140 Z" fill="#063b5f" />
    
    <!-- White outer circle -->
    <circle cx="80" cy="90" r="40" fill="#ffffff" />
    <!-- Yellow inner circle -->
    <circle cx="80" cy="90" r="25" fill="#f5a623" />

    <!-- Radio Grill -->
    <line x1="140" y1="70" x2="190" y2="70" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <line x1="140" y1="90" x2="190" y2="90" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <line x1="140" y1="110" x2="190" y2="110" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    
    <!-- White lines trailing behind in body (as in image) -->
    <line x1="230" y1="70" x2="250" y2="70" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <line x1="230" y1="90" x2="250" y2="90" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <line x1="230" y1="110" x2="250" y2="110" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Orange Swoosh -->
  <path d="M250 120 A 110 110 0 0 1 190 320 A 110 110 0 0 0 300 130 Z" fill="#f5a623" />
  <path d="M275 145 C350 200, 310 290, 210 320 C320 310, 360 210, 271 130 Z" fill="#f5a623" />

  <!-- Text -->
  <text x="250" y="390" font-family="'Arial Black', sans-serif" font-weight="900" font-size="70" fill="#000000" text-anchor="middle" letter-spacing="2">RADIO</text>
  <text x="250" y="420" font-family="sans-serif" font-weight="bold" font-size="14" fill="#333333" text-anchor="middle" letter-spacing="4">TAGLINE HERE</text>
</svg>