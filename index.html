<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIJ RADIO PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #050608 0%, #1a0505 50%, #4a0404 100%);
      background-attachment: fixed;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    @supports (-webkit-touch-callout: none) {
      body {
        height: -webkit-fill-available;
      }
    }
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .station-card {
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .station-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      border-color: rgba(225, 29, 72, 0.3);
    }
    .active-glow {
      box-shadow: 0 0 20px rgba(225, 29, 72, 0.15);
      border-color: rgba(225, 29, 72, 0.4);
      background: rgba(255, 255, 255, 0.05);
    }
    .wave-container {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
    }
    .wave-bar {
      width: 3px;
      background: #e11d48;
      border-radius: 1px;
      animation: sound-wave 1s infinite ease-in-out alternate;
    }
    @keyframes sound-wave {
      0% { height: 20%; }
      100% { height: 100%; }
    }
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(225, 29, 72, 0.15) 0%, transparent 70%);
      z-index: 0;
      filter: blur(40px);
      pointer-events: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    
    /* Fallback logo style */
    .fallback-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(225, 29, 72, 0.2), rgba(225, 29, 72, 0.05));
      color: #e11d48;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(225, 29, 72, 0.2);
    }
  </style>
</head>
<body>
  <!-- Decorative Glow -->
  <div class="glow-orb" style="top: -100px; left: -100px;"></div>
  <div class="glow-orb" style="bottom: -100px; right: -100px;"></div>

  <div class="flex flex-col md:flex-row h-full w-full relative z-10 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 glass md:border-r border-b md:border-b-0 border-white/10 flex flex-col p-4 md:p-6 shrink-0 overflow-y-auto hide-scrollbar z-20">
      <div class="flex items-center gap-3 mb-4 md:mb-10 shrink-0">
        <div class="w-12 h-12 flex items-center justify-center shrink-0">
          <img src="https://drive.google.com/uc?export=view&id=1c11GLaVOS5r9PQclCdQCZwDYvPUbx5-7" alt="Logo" class="w-full h-full object-contain drop-shadow-md rounded-xl">
        </div>
        <h1 class="text-xl font-bold tracking-tight text-white whitespace-nowrap">
          ARIJ RADIO <span class="text-red-500">PRO</span>
        </h1>
      </div>
      
      <nav class="flex flex-col gap-4 md:gap-6 text-sm flex-1">
        <div id="category-tabs" class="flex flex-row md:flex-col gap-2 shrink-0 overflow-x-auto md:overflow-visible pb-2 md:pb-0 hide-scrollbar">
          <p class="hidden md:block text-gray-500 uppercase text-[10px] font-bold tracking-widest px-2 mb-2">Catégories</p>
          <button data-cat="all" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap bg-red-500/15 text-red-400">
            <span>Tout</span>
          </button>
          <button data-cat="favorites" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span>Favoris</span>
          </button>
          <button data-cat="featured" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span>En vedette</span>
          </button>
          <button data-cat="dini" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span>Religieux</span>
          </button>
          <button data-cat="cities" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span>Villes</span>
          </button>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 min-h-0 bg-transparent overflow-hidden">
      <header class="h-16 md:h-20 shrink-0 flex items-center justify-between px-4 md:px-10 border-b border-white/5 space-x-reverse space-x-4">
        <div class="relative w-full md:w-96 max-w-full">
          <input 
            type="text" 
            id="search-input"
            placeholder="Rechercher une radio, ville ou genre..." 
            class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 pr-10 pl-4 text-sm focus:outline-none focus:border-red-500/50 transition-all text-white placeholder:text-gray-500"
          >
          <svg class="w-4 h-4 text-gray-500 absolute right-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4 text-xs md:text-sm font-medium shrink-0">
          <span class="text-red-500 flex items-center gap-2 whitespace-nowrap">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-lg shadow-red-500/50"></span>
            <span class="hidden sm:inline">En direct</span>
          </span>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-10 pb-4 md:pb-10 relative" style="-webkit-overflow-scrolling: touch;">
        <div id="greeting-card" class="mb-6 md:mb-8 p-4 md:p-6 rounded-2xl glass border-red-500/30 bg-red-500/5 flex items-center justify-center relative overflow-hidden" style="display: none;">
          <div class="absolute inset-0 bg-gradient-to-r from-red-500/10 via-transparent to-red-500/10"></div>
          <h2 id="greeting-text" class="text-xl md:text-2xl font-bold text-white relative z-10 text-center tracking-wide"></h2>
        </div>

        <div class="flex items-center justify-between mb-8">
          <h2 id="section-title" class="text-2xl font-semibold text-white">Toutes les radios</h2>
        </div>

        <div id="stations-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
          <!-- Stations will be injected here -->
        </div>
      </div>

      <footer class="shrink-0 w-full min-h-[88px] md:min-h-[96px] glass border-t border-white/10 flex items-center px-4 md:px-8 z-50 bg-[#1a0505]/95 backdrop-blur-xl pb-safe">
        <div id="player-info" class="flex items-center gap-3 w-2/5 md:w-1/4 min-w-0">
          <div id="player-logo-container" class="flex w-10 h-10 md:w-12 md:h-12 rounded-lg shrink-0 overflow-hidden bg-white/5 items-center justify-center">
            <span class="text-gray-500 text-[10px] md:text-xs">Logo</span>
          </div>
          <div class="min-w-0 flex-1">
            <h4 id="player-title" class="text-xs md:text-sm font-bold text-white truncate leading-tight">Sélectionnez une radio</h4>
            <p id="player-status" class="text-[9px] md:text-[10px] text-gray-400 font-medium truncate mt-0.5">Prêt à lire</p>
          </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center gap-1.5 md:gap-2">
          <div class="flex items-center gap-3 md:gap-6">
            <button id="play-btn" class="w-12 h-12 md:w-12 md:h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] shrink-0 group">
              <svg id="play-icon" class="w-5 h-5 md:w-5 md:h-5 ml-1 text-black group-hover:text-red-600 transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path d="M4 4l12 6-12 6z"></path>
              </svg>
              <svg id="pause-icon" class="w-5 h-5 md:w-5 md:h-5 text-black hidden" fill="currentColor" viewBox="0 0 20 20">
                <path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path>
              </svg>
            </button>
            <button id="stop-btn" class="text-gray-400 hover:text-white transition-colors p-2" title="Arrêter">
              <svg class="w-5 h-5 md:w-6 md:h-6" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.5 5a.5.5 0 01.5-.5h10a.5.5 0 01.5.5v10a.5.5 0 01-.5.5H5a.5.5 0 01-.5-.5V5z" clip-rule="evenodd"></path>
              </svg>
            </button>
          </div>
          
          <div class="w-full max-w-[150px] md:max-w-md h-1 bg-white/10 rounded-full overflow-hidden relative hidden sm:block">
            <div id="progress-bar" class="absolute left-0 top-0 h-full bg-gradient-to-r from-red-600 to-red-400" style="width: 0%;"></div>
          </div>
        </div>

        <div class="w-2/5 md:w-1/4 flex items-center justify-end gap-2 md:gap-4 shrink-0">
          <button id="sleep-timer-btn" class="flex items-center gap-1 text-[10px] md:text-xs text-gray-500 hover:text-red-400 transition-colors bg-white/5 hover:bg-white/10 px-2 py-1.5 md:px-2.5 rounded-lg border border-white/10" title="Minuterie">
            <svg id="sleep-timer-icon" class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="sleep-timer-display" class="font-medium hidden sm:inline-block">Minut.</span>
          </button>
          
          <button id="mute-btn" class="text-gray-500 hover:text-white transition-colors p-1">
            <svg id="vol-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
            </svg>
            <svg id="muted-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>
            </svg>
          </button>
          <div class="w-16 md:w-24 h-5 cursor-pointer relative flex items-center group">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="absolute inset-0 w-full opacity-0 cursor-pointer z-10" />
            <div class="w-full h-1 bg-white/20 rounded-full transition-all flex items-center group-hover:h-1.5 overflow-hidden">
               <div id="volume-fill" class="h-full bg-white rounded-full pointer-events-none" style="width: 100%;"></div>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </div>
  
  <audio id="audio-player" style="display: none;"></audio>

  <script>
    // 1. Data Base
    const radioStations = [
      {"title": "MFM Radio", "url": "https://a5.asurahosting.com:7980/radio.mp3", "cat": "featured", "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTkwKIybEDu0PVcGeeqjCre5Ua3m7HqeOrmfywt3txOQ&s"},
      {"title": "Medi 1 Radio", "url": "https://cdn.live.easybroadcast.io/live/83_medi1radio-maghreb_8s9i4bn/chunks.m3u8", "cat": "featured", "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRpbDLS8a3x6mDEgD9nKAVz8Ghceo7LibCEGzBO3Cg99g&s=10"},
      {"title": "Radio 2M", "url": "https://cdn-globecast.akamaized.net/live/eds/radio_2m/radio_hls_ts_hy217612tge1f21j83/radio_2m-mp4a_130400=1.m3u8", "cat": "featured", "logo": "https://upload.wikimedia.org/wikipedia/commons/4/4b/2M_Maroc_logo.svg"},
      {"title": "Hit Radio", "url": "https://hitradio-maroc.ice.infomaniak.ch/hitradio-maroc-128.mp3", "cat": "featured", "logo": "https://www.hitradio.ma/themes/custom/hitradio/logo.svg"},
      {"title": "Radio Mars", "url": "https://radiomars.ice.infomaniak.ch/radiomars-128.mp3", "cat": "featured", "logo": "https://www.radiomars.ma/wp-content/themes/radiomars/images/logo.png"},
      {"title": "Radio Aswat", "url": "https://aswat.ice.infomaniak.ch/aswat-high.mp3", "cat": "featured", "logo": "https://www.aswat.ma/assets/img/logo.png"},
      {"title": "Chada FM", "url": "https://edge16.vedge.infomaniak.com/livecast/ik:chadatv/chunklist_.m3u8", "cat": "featured", "logo": "https://www.chadafm.ma/wp-content/uploads/2019/01/logo-chada-fm.png"},
      {"title": "Radio Coran", "url": "https://virmach2.hajjam.net/index.html", "cat": "dini", "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8r0_3_W7Hs4NVzPog2MoNjyAx6L-Mgi1O1iwbZduMPQ&s=10"},
      {"title": "Cap Radio", "url": "https://listen.radioking.com/radio/710810/stream/776366", "cat": "cities", "logo": "https://www.capradio.ma/wp-content/uploads/2020/06/logo-capradio.png"}
    ];

    let favorites = JSON.parse(localStorage.getItem('arij_radio_favorites')) || [];

    let currentStation = null;
    let isPlaying = false;
    let hls = null;
    const audio = document.getElementById('audio-player');

    // UI Elements
    const stationsGrid = document.getElementById('stations-grid');
    const searchInput = document.getElementById('search-input');
    const catBtns = document.querySelectorAll('.cat-btn');
    const sectionTitle = document.getElementById('section-title');
    
    // Player UI
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const playerTitle = document.getElementById('player-title');
    const playerStatus = document.getElementById('player-status');
    const playerLogoContainer = document.getElementById('player-logo-container');
    const progressBar = document.getElementById('progress-bar');
    
    // Greeting
    const greetingCard = document.getElementById('greeting-card');
    const greetingText = document.getElementById('greeting-text');

    // Update Greeting
    function updateGreeting() {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const timeInHours = hour + minute / 60;
      
      let message = "";
      if (timeInHours >= 7 && timeInHours <= 12) {
        message = "Bonjour de Arij ☀️";
      } else if (timeInHours > 12 && timeInHours <= 19) {
        message = "Bonsoir de Arij 🌅";
      } else {
        message = "Arij vous souhaite une bonne nuit 🌙";
      }
      
      greetingText.textContent = message;
    }

    // Toggle Favorite
    window.toggleFavorite = function(e, title) {
      e.stopPropagation();
      if (favorites.includes(title)) {
        favorites = favorites.filter(t => t !== title);
      } else {
        favorites.push(title);
      }
      localStorage.setItem('arij_radio_favorites', JSON.stringify(favorites));
      
      // Re-render currently active tab
      const activeCat = document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat');
      renderStations(activeCat, searchInput.value);
    };
    
    // Image fallback function
    window.handleImageError = function(img, title) {
      img.onerror = null;
      img.src = "https://drive.google.com/uc?export=view&id=1c11GLaVOS5r9PQclCdQCZwDYvPUbx5-7";
    };

    // Render Stations
    function renderStations(filterCat = 'all', searchQuery = '') {
      stationsGrid.innerHTML = '';
      
      const filtered = radioStations.filter(station => {
        let matchCat = false;
        if (filterCat === 'all') {
          matchCat = true;
        } else if (filterCat === 'favorites') {
          matchCat = favorites.includes(station.title);
        } else {
          matchCat = station.cat === filterCat;
        }
        
        const matchSearch = station.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      if (filtered.length === 0) {
        stationsGrid.innerHTML = '<div class="col-span-full py-10 text-center text-gray-500">Aucune radio trouvée.</div>';
        return;
      }

      filtered.forEach((station, index) => {
        const isActive = currentStation && currentStation.title === station.title;
        const isCurrentlyPlaying = isActive && isPlaying;
        const isFavorite = favorites.includes(station.title);
        
        const card = document.createElement('div');
        card.className = `station-card glass p-4 md:p-5 rounded-2xl flex flex-col group ${isActive ? 'active-glow border-red-500/40 bg-white/[0.05]' : 'border-white/5'}`;
        card.onclick = () => playStation(station);

        card.innerHTML = `
          <button onclick="toggleFavorite(event, '${station.title.replace(/'/g, "\\'")}')" class="absolute top-3 right-3 md:top-4 md:right-4 p-1.5 rounded-full bg-black/20 hover:bg-black/40 transition-colors z-10 text-white shadow-sm border border-white/5">
            <svg class="w-4 h-4 ${isFavorite ? 'fill-red-500 text-red-500' : 'fill-none text-white'} transition-colors" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
          </button>
          <div class="flex items-center gap-4 mb-3 md:mb-4 pr-6">
            <div class="w-14 h-14 md:w-16 md:h-16 rounded-xl flex items-center justify-center overflow-hidden bg-white/95 shrink-0 p-1.5 shadow-md shadow-black/20">
              <img src="${station.logo}" alt="${station.title}" class="w-full h-full object-contain mix-blend-multiply" onerror="handleImageError(this, '${station.title.replace(/'/g, "\\'")}')">
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold mb-1 truncate text-white text-base md:text-lg">${station.title}</h3>
            </div>
          </div>
          
          <div class="mt-auto pt-3 md:pt-4 flex items-center justify-between text-[9px] md:text-[10px] uppercase tracking-tighter font-bold h-6 border-t border-white/5">
             ${isCurrentlyPlaying ? `
               <span class="text-red-500">En lecture</span>
               <div class="wave-container">
                 <div class="wave-bar" style="animation-delay: 0.1s"></div>
                 <div class="wave-bar" style="animation-delay: 0.2s"></div>
                 <div class="wave-bar" style="animation-delay: 0.3s"></div>
                 <div class="wave-bar" style="animation-delay: 0.4s"></div>
               </div>
             ` : isActive ? `
               <span class="text-red-500 animate-pulse">Connexion...</span>
             ` : `
               <span class="text-gray-500 group-hover:text-gray-300 transition-colors">Écouter</span>
             `}
          </div>
        `;
        stationsGrid.appendChild(card);
      });
    }

    // Play flow
    function playStation(station) {
      currentStation = station;
      isPlaying = false; 
      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat'), searchInput.value);
      playerStatus.innerHTML = '<span class="text-red-500 animate-pulse">Connexion...</span>';

      if (hls) {
        hls.destroy();
        hls = null;
      }
      
      audio.pause();
      audio.removeAttribute('src');
      audio.load();

      const playCurrent = () => {
        audio.play().then(() => {
          isPlaying = true;
          playerStatus.innerHTML = '<span class="text-red-500">Flux en direct connecté</span>';
          updatePlayerUI();
          renderStations(document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat'), searchInput.value);
        }).catch(err => {
          console.error(err);
          playerStatus.innerHTML = '<span class="text-rose-400">Erreur de lecture</span>';
        });
      };

      if (station.url.includes('.m3u8')) {
        if (Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(station.url);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, playCurrent);
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              playerStatus.innerHTML = '<span class="text-rose-400">Erreur de flux</span>';
            }
          });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
          audio.src = station.url;
          audio.addEventListener('loadedmetadata', playCurrent, { once: true });
        }
      } else {
        audio.src = station.url;
        playCurrent();
      }
    }

    function togglePlay() {
      if (!currentStation) return;
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        playerStatus.innerHTML = '<span class="text-gray-500">Arrêté</span>';
      } else {
        audio.play();
        isPlaying = true;
        playerStatus.innerHTML = '<span class="text-red-500">Flux en direct connecté</span>';
      }
      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat'), searchInput.value);
    }

    function updatePlayerUI() {
      if (currentStation) {
        playerTitle.textContent = currentStation.title;
        playerLogoContainer.innerHTML = `<div class="w-full h-full bg-white/90 p-1 flex"><img src="${currentStation.logo}" alt="${currentStation.title}" class="w-full h-full object-contain mix-blend-multiply" onerror="handleImageError(this, '${currentStation.title.replace(/'/g, "\\'")}')"></div>`;
      }
      if (isPlaying) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        progressBar.style.animation = "sound-wave 2s infinite linear alternate";
      } else {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        progressBar.style.animation = "none";
        progressBar.style.width = "0%";
      }
    }

    // Event Listeners
    const stopBtn = document.getElementById('stop-btn');

    stopBtn.addEventListener('click', () => {
      if (!currentStation) return;
      audio.pause();
      audio.removeAttribute('src');
      audio.load();
      if (hls) {
        hls.destroy();
        hls = null;
      }
      isPlaying = false;
      playerStatus.innerHTML = '<span class="text-gray-500">Arrêté</span>';
      
      // Also reset sleep timer when stopped manually
      if (sleepTimerTarget) {
        clearInterval(sleepTimerInterval);
        sleepTimerTarget = null;
        currentSleepTimerIndex = 0;
        updateSleepTimerDisplay();
      }

      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat'), searchInput.value);
    });

    playBtn.addEventListener('click', togglePlay);
    
    searchInput.addEventListener('input', (e) => {
      const activeCat = document.querySelector('.cat-btn.bg-red-500\\/15').getAttribute('data-cat');
      renderStations(activeCat, e.target.value);
    });

    catBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        catBtns.forEach(b => {
          b.className = b.className.replace('bg-red-500/15 text-red-400', 'text-gray-400 hover:text-white');
        });
        
        const clickedBtn = e.currentTarget;
        clickedBtn.className = clickedBtn.className.replace('text-gray-400 hover:text-white', 'bg-red-500/15 text-red-400');
        
        const cat = clickedBtn.getAttribute('data-cat');
        
        if (cat === 'all') {
          sectionTitle.textContent = "Toutes les radios";
          greetingCard.style.display = 'flex';
        } else {
          sectionTitle.textContent = clickedBtn.querySelector('span').textContent;
          greetingCard.style.display = 'none';
        }
        
        renderStations(cat, searchInput.value);
      });
    });

    // Volume Control
    const volumeSlider = document.getElementById('volume-slider');
    const volumeFill = document.getElementById('volume-fill');
    const muteBtn = document.getElementById('mute-btn');
    const volIcon = document.getElementById('vol-icon');
    const mutedIcon = document.getElementById('muted-icon');
    
    let isMuted = false;
    let currentVolume = 1;

    volumeSlider.addEventListener('input', (e) => {
      currentVolume = e.target.value;
      audio.volume = currentVolume;
      volumeFill.style.width = `${currentVolume * 100}%`;
      if (currentVolume == 0) {
        setMuteState(true);
      } else {
        setMuteState(false);
      }
    });

    muteBtn.addEventListener('click', () => {
      setMuteState(!isMuted);
      if (isMuted) {
        audio.volume = 0;
        volumeFill.style.width = "0%";
        volumeSlider.value = 0;
      } else {
        audio.volume = currentVolume || 0.5;
        volumeFill.style.width = `${audio.volume * 100}%`;
        volumeSlider.value = audio.volume;
      }
    });

    function setMuteState(muted) {
      isMuted = muted;
      if (muted) {
        volIcon.classList.add('hidden');
        mutedIcon.classList.remove('hidden');
      } else {
        volIcon.classList.remove('hidden');
        mutedIcon.classList.add('hidden');
      }
    }

    // Sleep Timer Logic
    let sleepTimerTarget = null;
    let sleepTimerInterval = null;
    const sleepTimerOptions = [0, 15, 30, 45, 60, 90, 120];
    let currentSleepTimerIndex = 0;
    
    const sleepTimerBtn = document.getElementById('sleep-timer-btn');
    const sleepTimerDisplay = document.getElementById('sleep-timer-display');

    function formatTime(seconds) {
      if (seconds <= 0) return "00:00";
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateSleepTimerDisplay() {
      if (!sleepTimerTarget) {
        if (currentSleepTimerIndex === 0) {
          sleepTimerDisplay.textContent = "Minut.";
          sleepTimerBtn.classList.remove('text-red-400', 'bg-red-500/15', 'border-red-500/30');
          sleepTimerBtn.classList.add('text-gray-500', 'bg-white/5', 'border-white/10');
          sleepTimerDisplay.classList.remove('inline-block');
          sleepTimerDisplay.classList.add('hidden', 'sm:inline-block');
        } else {
          sleepTimerDisplay.textContent = `${sleepTimerOptions[currentSleepTimerIndex]} min`;
          sleepTimerBtn.classList.remove('text-gray-500', 'bg-white/5', 'border-white/10');
          sleepTimerBtn.classList.add('text-red-400', 'bg-red-500/15', 'border-red-500/30');
          sleepTimerDisplay.classList.remove('hidden', 'sm:inline-block');
          sleepTimerDisplay.classList.add('inline-block');
        }
      } else {
        const remainingStr = formatTime(Math.max(0, Math.ceil((sleepTimerTarget - Date.now()) / 1000)));
        sleepTimerDisplay.textContent = remainingStr;
        sleepTimerBtn.classList.remove('text-gray-500', 'bg-white/5', 'border-white/10');
        sleepTimerBtn.classList.add('text-red-400', 'bg-red-500/15', 'border-red-500/30');
        sleepTimerDisplay.classList.remove('hidden', 'sm:inline-block');
        sleepTimerDisplay.classList.add('inline-block');
      }
    }

    sleepTimerBtn.addEventListener('click', () => {
      // If timer is active, next click resets it (turns it off) or cycles
      if (sleepTimerTarget) {
        clearInterval(sleepTimerInterval);
        sleepTimerTarget = null;
      }
      
      currentSleepTimerIndex = (currentSleepTimerIndex + 1) % sleepTimerOptions.length;
      
      if (currentSleepTimerIndex > 0) {
        const minutes = sleepTimerOptions[currentSleepTimerIndex];
        sleepTimerTarget = Date.now() + minutes * 60 * 1000;
        
        clearInterval(sleepTimerInterval);
        sleepTimerInterval = setInterval(() => {
          const remaining = Math.ceil((sleepTimerTarget - Date.now()) / 1000);
          if (remaining <= 0) {
            // Timer expired
            clearInterval(sleepTimerInterval);
            sleepTimerTarget = null;
            currentSleepTimerIndex = 0;
            updateSleepTimerDisplay();
            
            // Stop playback
            if (isPlaying && currentStation) {
              togglePlay();
            }
          } else {
            updateSleepTimerDisplay();
          }
        }, 1000);
      } else {
        clearInterval(sleepTimerInterval);
        sleepTimerTarget = null;
      }
      
      updateSleepTimerDisplay();
    });

    // Init
    updateGreeting();
    setInterval(updateGreeting, 60000);
    greetingCard.style.display = 'flex';
    renderStations();

  </script>
</body>
</html>
