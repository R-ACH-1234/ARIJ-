<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>ARIJ RADIO PRO</title>
  <link rel="icon" href="/app-logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/app-logo.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e5b84b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ARIJ RADIO">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #050810 0%, #0a1128 50%, #111a38 100%);
      background-attachment: fixed;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      width: 100vw;
      max-width: 100vw;
      height: 100vh; /* Fallback */
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-text-size-adjust: 100%;
    }
    @supports (-webkit-touch-callout: none) {
      body {
        height: -webkit-fill-available;
      }
    }
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .station-card {
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .station-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      border-color: rgba(229, 184, 75, 0.3);
    }
    .active-glow {
      box-shadow: 0 0 20px rgba(229, 184, 75, 0.15);
      border-color: rgba(229, 184, 75, 0.4);
      background: rgba(255, 255, 255, 0.05);
    }
    .wave-container {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
    }
    .wave-bar {
      width: 3px;
      background: #e5b84b;
      border-radius: 1px;
      animation: sound-wave 1s infinite ease-in-out alternate;
    }
    @keyframes sound-wave {
      0% { height: 20%; }
      100% { height: 100%; }
    }
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(229, 184, 75, 0.15) 0%, transparent 70%);
      z-index: 0;
      filter: blur(40px);
      pointer-events: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    
    /* News Ticker */
    .news-ticker-wrap {
      overflow: hidden;
      box-sizing: border-box;
      width: 100%;
      position: relative;
    }
    .news-ticker {
      display: inline-block;
      white-space: nowrap;
      animation: ticker 120s linear infinite;
    }
    .news-ticker-container:hover .news-ticker {
      animation-play-state: paused;
    }
    html[dir="ltr"] .news-ticker {
      padding-left: 100%;
    }
    html[dir="rtl"] .news-ticker {
      padding-right: 100%;
      animation-name: ticker-rtl;
    }
    @keyframes ticker {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }
    @keyframes ticker-rtl {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(100%, 0, 0); }
    }

    /* Fallback logo style */
    .fallback-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(229, 184, 75, 0.2), rgba(229, 184, 75, 0.05));
      color: #e5b84b;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(229, 184, 75, 0.2);
    }
  </style>
</head>
<body>
  <!-- Language Modal -->
  <div id="language-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm hidden">
    <div class="glass p-8 rounded-2xl border border-white/10 max-w-sm w-full mx-4 flex flex-col gap-6" dir="ltr">
      <div class="text-center">
        <h2 class="text-2xl font-bold text-white mb-2">Choisissez votre langue</h2>
        <p class="text-gray-400 text-sm">Choose your language / اختر لغتك</p>
      </div>
      <div class="flex flex-col gap-3">
        <button onclick="setLanguage('fr')" class="w-full py-3 px-4 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 hover:border-[#e5b84b]/50 rounded-xl transition-all font-medium flex items-center justify-between group">
          <span class="text-white group-hover:text-[#e5b84b]">Français</span>
          <span class="text-xl">🇫🇷</span>
        </button>
        <button onclick="setLanguage('ar')" class="w-full py-3 px-4 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 hover:border-[#e5b84b]/50 rounded-xl transition-all font-medium flex items-center justify-between group">
          <span class="text-white group-hover:text-[#e5b84b]">العربية</span>
          <span class="text-xl">🇲🇦</span>
        </button>
        <button onclick="setLanguage('en')" class="w-full py-3 px-4 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 hover:border-[#e5b84b]/50 rounded-xl transition-all font-medium flex items-center justify-between group">
          <span class="text-white group-hover:text-[#e5b84b]">English</span>
          <span class="text-xl">🇬🇧</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sleep Timer Modal -->
  <div id="sleep-timer-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm hidden" onclick="if(event.target===this) this.classList.add('hidden')">
    <div class="glass p-6 rounded-2xl border border-white/10 max-w-sm w-full mx-4 flex flex-col gap-4" dir="ltr">
      <div class="text-center mb-2">
        <h2 class="text-xl font-bold text-white mb-1" data-i18n="sleep_timer_title">Mise en veille</h2>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <button onclick="setSleepTimer(15)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">15 min</button>
        <button onclick="setSleepTimer(30)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">30 min</button>
        <button onclick="setSleepTimer(45)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">45 min</button>
        <button onclick="setSleepTimer(60)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">1 h</button>
        <button onclick="setSleepTimer(90)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">1.5 h</button>
        <button onclick="setSleepTimer(120)" class="py-3 bg-white/5 hover:bg-[#e5b84b]/20 border border-white/10 rounded-xl transition-all text-white font-medium">2 h</button>
      </div>
      <button onclick="setSleepTimer(0)" class="w-full py-3 mt-2 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 rounded-xl transition-all font-medium" data-i18n="sleep_timer_off">Désactiver</button>
      <button onclick="document.getElementById('sleep-timer-modal').classList.add('hidden')" class="w-full py-2 text-gray-500 hover:text-white transition-all font-medium" data-i18n="close">Fermer</button>
    </div>
  </div>

  <!-- Decorative Glow -->
  <div class="glow-orb" style="top: -100px; left: -100px;"></div>
  <div class="glow-orb" style="bottom: -100px; right: -100px;"></div>

  <div class="flex flex-1 flex-col md:flex-row h-full w-full relative z-10 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 glass md:border-r border-b md:border-b-0 border-white/10 flex flex-col p-2 md:p-6 shrink-0 overflow-y-auto hide-scrollbar z-20">
      <div class="flex items-center justify-between mb-3 md:mb-10 shrink-0 w-full">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center shrink-0">
            <img src="/app-logo.svg" alt="Logo" class="w-full h-full object-contain drop-shadow-md rounded-xl">
          </div>
          <div class="flex flex-col justify-center gap-1">
            <h1 class="text-lg md:text-xl font-bold tracking-tight text-white whitespace-nowrap leading-none line-clamp-1 truncate">
              ARIJ RADIO <span class="text-[#e5b84b]">PRO</span>
            </h1>
          </div>
        </div>
        <div id="local-clock" class="text-xl md:text-3xl text-[#e5b84b] font-mono tracking-wider font-bold whitespace-nowrap drop-shadow-sm" dir="ltr"></div>
      </div>
      
      <nav class="flex flex-col gap-4 md:gap-6 text-sm flex-1">
        <div id="category-tabs" class="flex flex-row md:flex-col gap-1.5 md:gap-2 shrink-0 overflow-x-auto md:overflow-visible pb-1 md:pb-0 hide-scrollbar">
          <p data-i18n="categories" class="hidden md:block text-gray-500 uppercase text-[10px] font-bold tracking-widest px-2 mb-2">Catégories</p>
          <button data-cat="all" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap bg-[#e5b84b]/15 text-[#e5b84b]">
            <span data-i18n="all">Tout</span>
          </button>
          <button data-cat="favorites" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span data-i18n="favorites">Favoris</span>
          </button>
          <button data-cat="featured" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="featured">En vedette</span>
          </button>
          <button data-cat="arabic" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="arabic">Arabe</span>
          </button>
          <button data-cat="news" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="news">Actualités</span>
          </button>
          <button data-cat="music" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="music">Musique</span>
          </button>
          <button data-cat="religious" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="religious">Religieux</span>
          </button>
          <button data-cat="cities" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="cities">Villes</span>
          </button>
          <button data-cat="amazigh" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="amazigh">Amazigh</span>
          </button>
          <button data-cat="sport" class="cat-btn flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white">
            <span data-i18n="sport">Sport</span>
          </button>

          <div class="h-px w-full bg-white/10 my-2 hidden md:block"></div>
          <button onclick="openLanguageModal()" class="flex items-center gap-3 px-3 py-2 rounded-lg font-medium transition-colors whitespace-nowrap text-gray-400 hover:text-white border border-white/5 hover:bg-white/5">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
            <span data-i18n="languages">Langues</span>
          </button>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 min-h-0 bg-transparent overflow-hidden">
      <header class="h-14 md:h-20 shrink-0 flex items-center justify-between px-2 md:px-10 border-b border-white/5 space-x-reverse space-x-4">
        <div class="relative flex-1 min-w-0 md:flex-none md:w-96 max-w-full">
          <input 
            type="text" 
            id="search-input"
            data-i18n-placeholder="search_placeholder"
            placeholder="Rechercher une radio, ville ou genre..." 
            class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 pr-10 pl-4 text-sm focus:outline-none focus:border-[#e5b84b]/50 transition-all text-white placeholder:text-gray-500"
          >
          <svg class="w-4 h-4 text-gray-500 absolute right-4 rtl:right-auto rtl:left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4 text-xs md:text-sm font-medium shrink-0">
          <span class="text-[#e5b84b] flex items-center gap-2 whitespace-nowrap">
            <span class="w-2 h-2 bg-[#e5b84b] rounded-full animate-pulse shadow-lg shadow-[#e5b84b]/50"></span>
            <span class="hidden sm:inline" data-i18n="live">En direct</span>
          </span>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto overflow-x-hidden p-1 pt-3 md:p-10 relative" style="-webkit-overflow-scrolling: touch;">
        <div id="greeting-card" class="news-ticker-container mb-4 md:mb-8 mx-1 md:mx-0 p-3 md:p-4 rounded-xl glass border-[#e5b84b]/30 bg-[#e5b84b]/5 flex items-center relative overflow-hidden" style="display: none;">
          <div class="absolute inset-0 bg-gradient-to-r from-[#e5b84b]/10 via-transparent to-[#e5b84b]/10"></div>
          
          <div class="z-10 flex-shrink-0 flex items-center gap-2 mr-3 ml-3 text-[#e5b84b] font-bold uppercase text-xs tracking-widest border-r border-l border-[#e5b84b]/30 px-3">
             <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"></path></svg>
             <span data-i18n="news_ticker_badge">NEWS</span>
          </div>

          <div class="news-ticker-wrap">
             <div id="greeting-text" class="news-ticker text-sm md:text-base font-semibold text-white/90 tracking-wide">
                <!-- News items will be injected here -->
             </div>
          </div>
        </div>

        <div class="flex items-center justify-between mb-4 md:mb-8 px-2 md:px-0">
          <h2 id="section-title" data-i18n-dynamic="true" class="text-xl md:text-2xl font-semibold text-white">Toutes les radios</h2>
        </div>

        <div id="stations-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2 md:gap-6 px-1 md:px-0">
          <!-- Stations will be injected here -->
        </div>
      </div>

      <footer class="shrink-0 w-full min-h-[80px] md:min-h-[96px] glass border-t border-white/10 flex items-center px-2 md:px-8 z-50 bg-[#0a1128]/95 backdrop-blur-xl pb-safe">
        <div id="player-info" class="flex items-center gap-2 md:gap-3 flex-1 min-w-0 md:w-1/4">
          <div id="player-logo-container" class="flex w-12 h-12 md:w-12 md:h-12 rounded-lg shrink-0 overflow-hidden bg-white/5 items-center justify-center">
            <img src="/app-logo.svg" alt="Logo" class="w-8 h-8 md:w-8 md:h-8 object-contain opacity-50 drop-shadow-md">
          </div>
          <div class="min-w-0 flex-1 ml-2 rtl:mr-2 rtl:ml-0">
            <h4 id="player-title" data-i18n="select_radio" class="text-xs md:text-sm font-bold text-white truncate leading-tight">Sélectionnez une radio</h4>
            <p id="player-status" data-i18n="ready" class="text-[9px] md:text-[10px] text-gray-400 font-medium truncate mt-0.5">Prêt à lire</p>
          </div>
        </div>

        <div class="shrink-0 md:flex-1 flex flex-col items-center justify-center gap-1.5 md:gap-2 px-1">
          <div class="flex items-center gap-3 md:gap-6">
            <button id="play-btn" class="w-12 h-12 md:w-12 md:h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] shrink-0 group">
              <svg id="play-icon" class="w-5 h-5 md:w-5 md:h-5 ml-1 text-black group-hover:text-[#e5b84b] transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path d="M4 4l12 6-12 6z"></path>
              </svg>
              <svg id="pause-icon" class="w-5 h-5 md:w-5 md:h-5 text-black hidden" fill="currentColor" viewBox="0 0 20 20">
                <path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path>
              </svg>
            </button>
            <button id="stop-btn" class="text-gray-400 hover:text-white transition-colors p-2" title="Arrêter" data-i18n-title="stop_btn">
              <svg class="w-5 h-5 md:w-6 md:h-6" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.5 5a.5.5 0 01.5-.5h10a.5.5 0 01.5.5v10a.5.5 0 01-.5.5H5a.5.5 0 01-.5-.5V5z" clip-rule="evenodd"></path>
              </svg>
            </button>
          </div>
          
          <div class="w-full max-w-[150px] md:max-w-md h-1 bg-white/10 rounded-full overflow-hidden relative hidden sm:block">
            <div id="progress-bar" class="absolute left-0 top-0 h-full bg-gradient-to-r from-[#e5b84b] to-[#c79a32]" style="width: 0%;"></div>
          </div>
        </div>

        <div class="shrink-0 md:flex-1 md:w-1/4 flex items-center justify-end rtl:justify-start gap-1 md:gap-4 min-w-0 pl-1 md:pl-0">
          <button id="sleep-timer-btn" onclick="openSleepTimerModal()" class="flex items-center gap-1 text-[10px] md:text-xs text-gray-500 hover:text-[#e5b84b] transition-colors bg-white/5 hover:bg-white/10 px-2 py-1.5 md:px-2.5 rounded-lg border border-white/10" data-i18n-title="timer">
            <svg id="sleep-timer-icon" class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="sleep-timer-display" class="font-medium hidden sm:inline-block" data-i18n="timer_short">Minut.</span>
          </button>
          
          <button id="mute-btn" class="text-gray-500 hover:text-white transition-colors p-1">
            <svg id="vol-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
            </svg>
            <svg id="muted-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>
            </svg>
          </button>
          <div class="w-12 sm:w-16 md:w-24 h-5 cursor-pointer relative flex items-center group">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="absolute inset-0 w-full opacity-0 cursor-pointer z-10" />
            <div class="w-full h-1 bg-white/20 rounded-full transition-all flex items-center group-hover:h-1.5 overflow-hidden">
               <div id="volume-fill" class="h-full bg-white rounded-full pointer-events-none" style="width: 100%;"></div>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </div>
  
  <audio id="audio-player" crossorigin="anonymous" style="display: none;"></audio>

  <script>
    // 0. Translations
    const translations = {
      fr: {
        choose_lang: "Choisissez votre langue",
        categories: "Catégories",
        all: "Tout",
        favorites: "Favoris",
        featured: "En vedette",
        arabic: "Arabe",
        news: "Actualités",
        music: "Musique",
        religious: "Religieux",
        cities: "Villes",
        amazigh: "Amazigh",
        sport: "Sport",
        search_placeholder: "Rechercher une radio, ville ou genre...",
        live: "En direct",

    let cachedNews = {
      fr: null,
      ar: null,
      en: null,
      timestamp: 0

    async function updateGreeting() {
      const now = Date.now();
      const CACHE_MINS = 15;
      
      let feedUrl = 'https://www.hespress.com/feed'; // ar
      if (currentLang === 'fr') feedUrl = 'https://fr.hespress.com/feed';
      if (currentLang === 'en') feedUrl = 'https://en.hespress.com/feed';
      
      const greetingText = document.getElementById('greeting-text');
      
      try {
        if (!cachedNews[currentLang] || (now - cachedNews.timestamp > CACHE_MINS * 60 * 1000)) {
          const res = await fetch(feedUrl);
          const xmlText = await res.text();
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");
          const items = Array.from(xmlDoc.querySelectorAll("item")).slice(0, 15);
          
          let newsHtml = items.map(item => {
            const title = item.querySelector("title")?.textContent || "";
            const link = item.querySelector("link")?.textContent || "#";
            return `<a href="${link}" target="_blank" class="hover:text-white transition-colors mx-8 hover:underline">${title}</a>`;
          }).join('<span class="text-[#e5b84b] font-bold select-none mx-2">|</span>');
          
          cachedNews[currentLang] = newsHtml;
          cachedNews.timestamp = now;
        }

        if (greetingText.innerHTML !== cachedNews[currentLang]) {
          greetingText.innerHTML = cachedNews[currentLang];
        }
      } catch (err) {
        console.error("Failed to fetch news:", err);
        // Fallback
        const t = translations[currentLang];
        const fallbackHtml = `<span class="mx-8">${t.good_morning}</span><span class="text-[#e5b84b] font-bold mx-2">|</span><span class="mx-8">${t.good_afternoon}</span><span class="text-[#e5b84b] font-bold mx-2">|</span><span class="mx-8">${t.good_night}</span>`;
        if (greetingText.innerHTML !== fallbackHtml) {
          greetingText.innerHTML = fallbackHtml;
        }
      }
    }

    // Play flow
    function playStation(station) {
      currentStation = station;
      isPlaying = false; 
      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.text-\\[\\#e5b84b\\]').getAttribute('data-cat'), searchInput.value);
      
      const t = translations[currentLang];
      playerStatus.innerHTML = `<span class="text-[#e5b84b] animate-pulse">${t.connecting}</span>`;

      if (hls) {
        hls.destroy();
        hls = null;
      }
      
      audio.pause();
      audio.removeAttribute('src');

      const playCurrent = () => {
        audio.play().then(() => {
          isPlaying = true;
          playerStatus.innerHTML = `<span class="text-[#e5b84b]">${translations[currentLang].connected_stream}</span>`;
          updatePlayerUI();
          renderStations(document.querySelector('.cat-btn.text-\\[\\#e5b84b\\]').getAttribute('data-cat'), searchInput.value);
        }).catch(err => {
          console.error(err);
          playerStatus.innerHTML = `<span class="text-rose-400">${translations[currentLang].error_play}</span>`;
        });
      };

      const handleError = () => {
        playerStatus.innerHTML = `<span class="text-rose-400">${translations[currentLang].error_stream}</span>`;
        isPlaying = false;
        updatePlayerUI();
      };
      
      audio.removeEventListener('error', handleError);
      audio.addEventListener('error', handleError);

      if (station.url.includes('.m3u8')) {
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const canPlayNative = audio.canPlayType('application/vnd.apple.mpegurl');
        
        if (canPlayNative && (isSafari || !Hls.isSupported())) {
          audio.src = station.url;
          audio.addEventListener('loadedmetadata', playCurrent, { once: true });
        } else if (Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(station.url);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, playCurrent);
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              handleError();
            }
          });
        }
      } else {
        audio.src = station.url;
        playCurrent();
      }
    }

    function togglePlay() {

      } else {
        audio.play();
        isPlaying = true;
        playerStatus.innerHTML = `<span class="text-[#e5b84b]">${t.connected_stream}</span>`;
      }
      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.text-\\[\\#e5b84b\\]').getAttribute('data-cat'), searchInput.value);
    }

    function updatePlayerUI() {
      if (currentStation) {
        playerTitle.textContent = currentStation.title;
        playerLogoContainer.innerHTML = `<div class="w-full h-full bg-white/90 p-1 flex"><img src="${currentStation.logo}" alt="${currentStation.title}" class="w-full h-full object-contain mix-blend-multiply" onerror="handleImageError(this, '${currentStation.title.replace(/'/g, "\\'")}')"></div>`;
        
        if ('mediaSession' in navigator) {
          let logoSrc = currentStation.logo;
          if (logoSrc === '/app-logo.svg' || logoSrc.startsWith('/')) {
            logoSrc = window.location.origin + (logoSrc.startsWith('/') ? logoSrc : '/' + logoSrc);
          }
          navigator.mediaSession.metadata = new MediaMetadata({
            title: currentStation.title,
            artist: 'ARiJ Radio',
            artwork: [
              { src: logoSrc, sizes: '512x512', type: 'image/png' }
            ]
          });
          
          navigator.mediaSession.setActionHandler('play', togglePlay);
          navigator.mediaSession.setActionHandler('pause', togglePlay);
        }
      }
      if (isPlaying) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        progressBar.style.animation = "sound-wave 2s infinite linear alternate";
      } else {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        progressBar.style.animation = "none";
        progressBar.style.width = "0%";
      }
    }

    // Event Listeners
    const stopBtn = document.getElementById('stop-btn');

    stopBtn.addEventListener('click', () => {
      if (!currentStation) return;
      audio.pause();
      audio.removeAttribute('src');
      if (hls) {
        hls.destroy();
        hls = null;
      }
      isPlaying = false;
      playerStatus.innerHTML = `<span class="text-gray-500">${translations[currentLang].stopped}</span>`;
      
      // Also reset sleep timer when stopped manually
      if (sleepTimerTarget) {
        clearInterval(sleepTimerInterval);
        sleepTimerTarget = null;
        currentSleepTimerIndex = 0;
        updateSleepTimerDisplay();
      }

      updatePlayerUI();
      renderStations(document.querySelector('.cat-btn.text-\\[\\#e5b84b\\]').getAttribute('data-cat'), searchInput.value);
    });

    playBtn.addEventListener('click', togglePlay);
    
    searchInput.addEventListener('input', (e) => {
      const activeCat = document.querySelector('.cat-btn.text-\\[\\#e5b84b\\]').getAttribute('data-cat');
      renderStations(activeCat, e.target.value);
    });

    catBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        catBtns.forEach(b => {
          b.className = b.className.replace('bg-[#e5b84b]/15 text-[#e5b84b]', 'text-gray-400 hover:text-white');
        });
        
        const clickedBtn = e.currentTarget;
        clickedBtn.className = clickedBtn.className.replace('text-gray-400 hover:text-white', 'bg-[#e5b84b]/15 text-[#e5b84b]');
        
        const cat = clickedBtn.getAttribute('data-cat');
        
        if (cat === 'all') {
          sectionTitle.textContent = translations[currentLang].all_radios;
          greetingCard.style.display = 'flex';
        } else {
          sectionTitle.textContent = translations[currentLang][cat] || clickedBtn.querySelector('span').textContent;
          greetingCard.style.display = 'none';
        }
        
        renderStations(cat, searchInput.value);
      });
    });

    // Volume Control
    const volumeSlider = document.getElementById('volume-slider');
    const volumeFill = document.getElementById('volume-fill');
    const muteBtn = document.getElementById('mute-btn');
    const volIcon = document.getElementById('vol-icon');
    const mutedIcon = document.getElementById('muted-icon');
    
    let isMuted = false;
    let currentVolume = 1;

    volumeSlider.addEventListener('input', (e) => {
      currentVolume = e.target.value;
      audio.volume = currentVolume;
      volumeFill.style.width = `${currentVolume * 100}%`;
      if (currentVolume == 0) {
        setMuteState(true);
      } else {
        setMuteState(false);
      }
    });

    muteBtn.addEventListener('click', () => {
      setMuteState(!isMuted);
      if (isMuted) {
        audio.volume = 0;
        volumeFill.style.width = "0%";
        volumeSlider.value = 0;
      } else {
        audio.volume = currentVolume || 0.5;
        volumeFill.style.width = `${audio.volume * 100}%`;
        volumeSlider.value = audio.volume;
      }
    });

    function setMuteState(muted) {
      isMuted = muted;
      if (muted) {
        volIcon.classList.add('hidden');
        mutedIcon.classList.remove('hidden');
      } else {
        volIcon.classList.remove('hidden');
        mutedIcon.classList.add('hidden');
      }
    }

    // Sleep Timer Logic
    let sleepTimerTarget = null;
    let sleepTimerInterval = null;
    const sleepTimerOptions = [0, 15, 30, 45, 60, 90, 120];
    let currentSleepTimerIndex = 0;
    
    const sleepTimerBtn = document.getElementById('sleep-timer-btn');
    const sleepTimerDisplay = document.getElementById('sleep-timer-display');

    function formatTime(seconds) {
      if (seconds <= 0) return "00:00";
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateSleepTimerDisplay() {
      if (!sleepTimerTarget) {
        sleepTimerDisplay.textContent = translations[currentLang].timer_short;
        sleepTimerBtn.classList.remove('text-[#e5b84b]', 'bg-[#e5b84b]/15', 'border-[#e5b84b]/30');
        sleepTimerBtn.classList.add('text-gray-500', 'bg-white/5', 'border-white/10');
        sleepTimerDisplay.classList.add('hidden', 'sm:inline-block');
      } else {
        const remainingStr = formatTime(Math.max(0, Math.ceil((sleepTimerTarget - Date.now()) / 1000)));
        sleepTimerDisplay.textContent = remainingStr;
        sleepTimerBtn.classList.remove('text-gray-500', 'bg-white/5', 'border-white/10');
        sleepTimerBtn.classList.add('text-[#e5b84b]', 'bg-[#e5b84b]/15', 'border-[#e5b84b]/30');
        sleepTimerDisplay.classList.remove('hidden', 'sm:inline-block');
      }
    }

    function openSleepTimerModal() {
      document.getElementById('sleep-timer-modal').classList.remove('hidden');
    }

    function setSleepTimer(minutes) {
      document.getElementById('sleep-timer-modal').classList.add('hidden');
      if (sleepTimerTarget) {
        clearInterval(sleepTimerInterval);
        sleepTimerTarget = null;
      }
      
      if (minutes > 0) {
        sleepTimerTarget = Date.now() + minutes * 60 * 1000;
        
        sleepTimerInterval = setInterval(() => {
          const remaining = Math.ceil((sleepTimerTarget - Date.now()) / 1000);
          if (remaining <= 0) {
            // Timer expired
            clearInterval(sleepTimerInterval);
            sleepTimerTarget = null;
            updateSleepTimerDisplay();
            
            // Stop playback
            if (isPlaying && currentStation) {
              togglePlay();
            }
          } else {
            updateSleepTimerDisplay();
          }
        }, 1000);
      }
      
      updateSleepTimerDisplay();
    }

    // Init
    const savedLang = localStorage.getItem('arij_lang');
    if (!savedLang) {
      openLanguageModal();
    } else {
      setLanguage(savedLang);
    }

    updateClock();
    setInterval(updateClock, 1000);
    
    updateGreeting();
    setInterval(updateGreeting, 60000);
    greetingCard.style.display = 'flex';
    renderStations();

  </script>
</body>
</html>
